name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      # Checkout the Repo
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Install Node 18
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Npm Install
        run: npm install
        
      - name: Lint
        run: npm run lint
        
      - name: Test
        run: npm test

    # Generate sonar-project.properties dynamically
      - name: Generate sonar-project.properties
        run: |
          echo "sonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}" > sonar-project.properties
          echo "sonar.organization=${{ secrets.SONAR_ORGANIZATION }}" >> sonar-project.properties
          echo "sonar.sources=." >> sonar-project.properties
          echo "sonar.sourceEncoding=UTF-8" >> sonar-project.properties        


      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 

      # Delete sonar-project.properties after scan
      - name: Remove sonar-project.properties
        if: always()
        run: rm sonar-project.properties

  Test_Docker:
    runs-on: ubuntu-latest
    steps:

      # Checkout Repository
      - uses: actions/checkout@v3
      
      # Docker Build
      - uses: docker/build-push-action@v3
        with:
          push: false
          file: ./Dockerfile
          tags: front-stage:test
          build-args: |
            password=${{ secrets.DOCKER_PASS }}
